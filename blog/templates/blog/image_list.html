<!DOCTYPE html>
<html>
<head>
    <title>Imágenes</title>
</head>
<body>
    <h2>Lista de Imágenes</h2>
    {% for image in images %}
        <div>
            <h3>{{ image.title }}</h3>
            <img src="{{ image.image.url }}" alt="{{ image.title }}" style="width:200px;">
            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="image_id" value="{{ image.id }}">
                <label for="score">Calificar:</label>
                <select name="score">
                    {% for i in "12345" %}
                        <option value="{{ i }}">{{ i }}</option>
                    {% endfor %}
                </select>
                <button type="submit">Enviar</button>
            </form>
        </div>
    {% endfor %}
</body>
</html>
